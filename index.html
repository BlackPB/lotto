<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>로또 조합 추천기</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0f0f11; --surface:#1a1a1f; --surface2:#222228;
  --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.16);
  --text:#f0f0f0; --text2:#888; --text3:#4a4a52;
  --accent:#e8c84a;
  --r1:#f5a623; --r1t:#3d2800;
  --r2:#4a9eff; --r2t:#001833;
  --r3:#ff6b4a; --r3t:#330f00;
  --r4:#6abf69; --r4t:#0a2409;
  --r5:#9e9e9e; --r5t:#1a1a1a;
  --dup:#ff4d4d;
  --hit:#e8c84a; --hit-bg:rgba(232,200,74,0.12);
  --bonus:#c084fc; --bonus-bg:rgba(192,132,252,0.12);
  --rad:12px; --rad-sm:8px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;height:100%;overflow:hidden;}
.app{display:flex;flex-direction:column;height:100%;}

/* ── Header ── */
.header{
  padding:1rem 2rem 0.9rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;flex-shrink:0;gap:1rem;
}
.header h1{font-size:19px;font-weight:700;color:var(--accent);letter-spacing:-0.4px;}
.header p{font-size:11px;color:var(--text2);margin-top:2px;}

/* ── Body ── */
.body{flex:1;display:flex;justify-content:center;overflow:hidden;min-height:0;}

/* LEFT */
.left-panel{width:390px;flex-shrink:0;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}

/* RIGHT */
.right-panel{width:420px;flex-shrink:0;display:flex;flex-direction:column;overflow:hidden;}

/* ── Set tabs ── */
.tabs{display:flex;flex-shrink:0;border-bottom:1px solid var(--border);background:var(--surface);}
.tab{
  flex:1;padding:10px 2px;text-align:center;
  font-size:12px;font-weight:500;color:var(--text3);
  cursor:pointer;border-bottom:2px solid transparent;
  transition:all 0.15s;position:relative;user-select:none;
}
.tab:hover{color:var(--text2);}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab.done::after{content:'✓';position:absolute;top:4px;right:5px;font-size:9px;color:#6abf69;}
.tab.has-dup::after{content:'!';position:absolute;top:4px;right:5px;font-size:10px;color:var(--dup);font-weight:700;}

/* ── Grid ── */
.grid-wrap{flex:1;overflow-y:auto;padding:12px 14px;}
.grid-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.grid-info-label{font-size:12px;color:var(--text2);}
.grid-count{font-family:'DM Mono',monospace;font-size:13px;}
.grid-count span{color:var(--accent);font-weight:500;}
.num-grid{display:flex;flex-direction:column;gap:5px;}
.num-row{display:flex;align-items:center;gap:5px;}
.row-label{font-size:10px;color:var(--text3);width:26px;flex-shrink:0;font-family:'DM Mono',monospace;text-align:right;padding-right:3px;}
.nb{
  width:34px;height:34px;flex-shrink:0;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text3);font-size:12px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.1s;user-select:none;font-family:'DM Mono',monospace;
}
.nb:hover{border-color:var(--border2);color:var(--text2);}
.nb.sel{color:#111;border-color:transparent;font-weight:700;}
.nb.sel.r1{background:var(--r1);}
.nb.sel.r2{background:var(--r2);}
.nb.sel.r3{background:var(--r3);}
.nb.sel.r4{background:var(--r4);}
.nb.sel.r5{background:var(--r5);}
.nb.dup-ring{box-shadow:0 0 0 2px var(--dup);}
.nb.disabled{opacity:0.25;cursor:not-allowed;pointer-events:none;}

/* ── Balls preview ── */
.balls-preview{flex-shrink:0;padding:10px 14px;border-top:1px solid var(--border);background:var(--surface);min-height:56px;}
.balls-row{display:flex;gap:5px;align-items:center;flex-wrap:wrap;}
.ball{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;font-family:'DM Mono',monospace;}
.ball.r1{background:var(--r1);color:var(--r1t);}
.ball.r2{background:var(--r2);color:var(--r2t);}
.ball.r3{background:var(--r3);color:var(--r3t);}
.ball.r4{background:var(--r4);color:var(--r4t);}
.ball.r5{background:var(--r5);color:var(--r5t);}
.ball.dup-ball{outline:2px solid var(--dup);outline-offset:1px;}
.ball-empty{font-size:12px;color:var(--text3);}
.clear-set-btn{margin-left:auto;font-size:11px;color:var(--text3);background:none;border:1px solid var(--border);border-radius:6px;padding:4px 8px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.12s;flex-shrink:0;}
.clear-set-btn:hover{color:var(--text2);border-color:var(--border2);}

/* ── RIGHT panel sections ── */
.rp-section{flex-shrink:0;padding:10px 16px;border-bottom:1px solid var(--border);}
.rp-section.scrollable{flex:1;overflow-y:auto;border-bottom:none;}

/* ── Overview ── */
.section-title{font-size:10px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:7px;}
.sets-overview{display:flex;flex-direction:column;gap:5px;}
.set-ov-row{display:flex;align-items:center;gap:8px;}
.set-ov-label{font-size:11px;color:var(--text3);min-width:34px;font-family:'DM Mono',monospace;}
.set-ov-balls{display:flex;gap:3px;flex:1;}
.sm-ball{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:'DM Mono',monospace;}
.sm-ball.r1{background:var(--r1);color:var(--r1t);}
.sm-ball.r2{background:var(--r2);color:var(--r2t);}
.sm-ball.r3{background:var(--r3);color:var(--r3t);}
.sm-ball.r4{background:var(--r4);color:var(--r4t);}
.sm-ball.r5{background:var(--r5);color:var(--r5t);}
.sm-ball.dup-ball{outline:2px solid var(--dup);outline-offset:1px;}
.sm-ball.empty-slot{background:var(--surface2);border:1px dashed var(--border2);}
.set-ov-status{font-size:11px;color:var(--text3);min-width:26px;text-align:right;font-family:'DM Mono',monospace;}
.set-ov-status.done{color:#6abf69;}

/* ── Summary ── */
.summary-row{display:flex;gap:7px;align-items:center;flex-wrap:wrap;}
.summary-text{font-size:12px;color:var(--text2);}
.badge{font-size:11px;padding:2px 9px;border-radius:20px;font-family:'DM Mono',monospace;}
.badge.uniq{background:rgba(106,191,105,0.15);color:#6abf69;}
.badge.dup{background:rgba(255,77,77,0.12);color:var(--dup);}

/* ── Controls ── */
.ctrl-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ctrl-label{font-size:12px;color:var(--text2);}
select{font-size:12px;padding:5px 9px;border-radius:var(--rad-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text);cursor:pointer;font-family:'Noto Sans KR',sans-serif;}
.btn{font-size:12px;padding:6px 14px;border-radius:var(--rad-sm);border:1px solid var(--border2);background:var(--surface2);color:var(--text2);cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all 0.12s;white-space:nowrap;}
.btn:hover{background:var(--surface);color:var(--text);}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#111;font-weight:700;}
.btn.primary:hover{background:#f5d96a;}
.btn.ghost{color:var(--text3);}

/* ── Warn ── */
.warn-bar{display:none;font-size:12px;color:var(--dup);background:rgba(255,77,77,0.08);border:1px solid rgba(255,77,77,0.2);border-radius:var(--rad-sm);padding:7px 12px;margin-top:8px;}

/* ── 당첨번호 입력 ── */
.winning-section{}
.winning-grid{display:flex;flex-direction:column;gap:5px;margin-top:8px;}
.winning-row-line{display:flex;align-items:center;gap:5px;}
.winning-row-lbl{font-size:10px;color:var(--text3);width:26px;flex-shrink:0;font-family:'DM Mono',monospace;text-align:right;padding-right:3px;}
.wnb{
  width:32px;height:32px;flex-shrink:0;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text3);font-size:11px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.1s;user-select:none;font-family:'DM Mono',monospace;
}
.wnb:hover{border-color:var(--border2);color:var(--text2);}
.wnb.win-sel{color:#111;border-color:transparent;font-weight:700;}
.wnb.win-sel.r1{background:var(--r1);}
.wnb.win-sel.r2{background:var(--r2);}
.wnb.win-sel.r3{background:var(--r3);}
.wnb.win-sel.r4{background:var(--r4);}
.wnb.win-sel.r5{background:var(--r5);}
.bonus-sep{font-size:11px;color:var(--text3);padding:0 2px;flex-shrink:0;}
.wnb.bonus-sel{background:var(--bonus);color:#fff;border-color:transparent;font-weight:700;}
.win-info{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.win-count{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2);}
.win-count span{color:var(--accent);font-weight:500;}
.win-btns{display:flex;gap:6px;}

/* ── Results ── */
.results-inner{padding:14px 16px;}
.results-empty{display:flex;align-items:center;justify-content:center;height:120px;color:var(--text3);font-size:13px;text-align:center;flex-direction:column;gap:8px;}
.results-empty .icon{font-size:28px;opacity:0.25;}

.result-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--rad);padding:11px 14px;
  margin-bottom:8px;animation:slideIn 0.2s ease both;
}
@keyframes slideIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.rc-top{display:flex;align-items:center;gap:10px;margin-bottom:0;}
.rc-idx{font-size:12px;color:var(--text3);min-width:22px;font-family:'DM Mono',monospace;flex-shrink:0;}
.rc-balls{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
.rc-rank{flex-shrink:0;}

/* rank badges */
.rank-badge{
  font-size:11px;font-weight:700;padding:3px 9px;border-radius:20px;
  font-family:'DM Mono',monospace;white-space:nowrap;
}
.rank-1{background:rgba(232,200,74,0.2);color:#e8c84a;border:1px solid rgba(232,200,74,0.4);}
.rank-2{background:rgba(192,132,252,0.18);color:#c084fc;border:1px solid rgba(192,132,252,0.35);}
.rank-3{background:rgba(74,159,255,0.15);color:#4a9eff;border:1px solid rgba(74,159,255,0.3);}
.rank-4{background:rgba(106,191,105,0.15);color:#6abf69;border:1px solid rgba(106,191,105,0.3);}
.rank-5{background:rgba(255,107,74,0.12);color:#ff6b4a;border:1px solid rgba(255,107,74,0.25);}
.rank-none{background:rgba(74,74,82,0.3);color:var(--text3);border:1px solid var(--border);}

/* comparison bar under each card */
.rc-compare{
  margin-top:8px;padding-top:8px;
  border-top:1px solid var(--border);
  display:flex;gap:5px;align-items:center;flex-wrap:wrap;
}
.r-ball{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;font-family:'DM Mono',monospace;flex-shrink:0;
  position:relative;
}
.r-ball.r1{background:var(--r1);color:var(--r1t);}
.r-ball.r2{background:var(--r2);color:var(--r2t);}
.r-ball.r3{background:var(--r3);color:var(--r3t);}
.r-ball.r4{background:var(--r4);color:var(--r4t);}
.r-ball.r5{background:var(--r5);color:var(--r5t);}
.r-ball.dimmed{opacity:0.22;}
.r-ball.hit-ring{box-shadow:0 0 0 2.5px var(--hit),0 0 8px rgba(232,200,74,0.35);}
.r-ball.bonus-ring{box-shadow:0 0 0 2.5px var(--bonus),0 0 8px rgba(192,132,252,0.35);}
.match-info{font-size:11px;color:var(--text3);margin-left:auto;white-space:nowrap;flex-shrink:0;}
.match-hit{color:var(--hit);}
.match-bonus{color:var(--bonus);}

/* scrollbar */
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* mobile nav hidden on desktop */
.mobile-page-nav{display:none;}

/* ═══════════════
   MOBILE < 768px
═══════════════ */
@media(max-width:767px){
  .header{padding:0.8rem 1rem 0.7rem;}
  .header h1{font-size:16px;}
  .header p{font-size:11px;}

  .body{flex-direction:column;overflow:hidden;position:relative;}
  .left-panel,.right-panel{
    position:absolute;inset:0;width:100%;height:100%;border:none;
    transition:transform 0.28s cubic-bezier(.4,0,.2,1),opacity 0.25s;
  }
  .left-panel{transform:translateX(0);opacity:1;z-index:1;}
  .right-panel{transform:translateX(100%);opacity:0;z-index:0;}
  .body.show-right .left-panel{transform:translateX(-100%);opacity:0;z-index:0;}
  .body.show-right .right-panel{transform:translateX(0);opacity:1;z-index:1;}

  .nb{width:30px;height:30px;font-size:11px;}
  .wnb{width:28px;height:28px;font-size:10px;}
  .num-row,.winning-row-line{gap:3px;}
  .row-label,.winning-row-lbl{width:22px;font-size:9px;}
  .grid-wrap{padding:10px;}

  .mobile-page-nav{
    display:flex;flex-shrink:0;
    border-top:1px solid var(--border);background:var(--surface);
  }
  .mpn-btn{
    flex:1;padding:12px 4px;text-align:center;
    font-size:13px;font-weight:500;color:var(--text3);
    cursor:pointer;border-top:2px solid transparent;
    transition:all 0.15s;user-select:none;
  }
  .mpn-btn.active{color:var(--accent);border-top-color:var(--accent);}

  .rp-section{padding:9px 13px;}
  .sm-ball{width:25px;height:25px;font-size:9px;}
  .btn.primary{flex:1;text-align:center;}
}
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <h1>로또 조합 추천기</h1>
      <p>5세트 입력 → 중복 제거 → 조합 추천 → 당첨번호 비교</p>
    </div>
  </div>

  <div class="body" id="body">

    <!-- ══ LEFT: 번호 선택 ══ -->
    <div class="left-panel">
      <div class="tabs" id="tabs"></div>
      <div class="grid-wrap">
        <div class="grid-info">
          <span class="grid-info-label" id="gridLabel">1세트 번호 선택</span>
          <span class="grid-count"><span id="gridCount">0</span> / 6</span>
        </div>
        <div class="num-grid" id="numGrid"></div>
      </div>
      <div class="balls-preview">
        <div class="balls-row" id="ballsRow">
          <span class="ball-empty">선택한 번호가 여기에 표시됩니다</span>
        </div>
      </div>
    </div>

    <!-- ══ RIGHT: 현황 / 조합 / 비교 ══ -->
    <div class="right-panel">

      <!-- 세트 현황 -->
      <div class="rp-section">
        <div class="section-title">세트 현황</div>
        <div class="sets-overview" id="setsOverview"></div>
      </div>

      <!-- 요약 + 조합 컨트롤 -->
      <div class="rp-section">
        <div class="summary-row" id="summaryRow" style="margin-bottom:8px;">
          <span class="summary-text">번호를 선택해주세요</span>
        </div>
        <div class="ctrl-row">
          <span class="ctrl-label">추천 수</span>
          <select id="countSel">
            <option value="3">3개</option>
            <option value="5" selected>5개</option>
            <option value="7">7개</option>
            <option value="10">10개</option>
          </select>
          <button class="btn primary" onclick="generate()">조합 추천 →</button>
          <button class="btn ghost" onclick="resetAll()">초기화</button>
        </div>
        <div class="warn-bar" id="warnBar"></div>
      </div>

      <!-- 당첨번호 입력 -->
      <div class="rp-section winning-section">
        <div class="win-info">
          <div class="section-title" style="margin-bottom:0;">당첨번호 입력</div>
          <div style="display:flex;gap:6px;align-items:center;">
            <span class="win-count">당첨 <span id="winCount">0</span>/6 · 보너스 <span id="bonusCount">0</span>/1</span>
            <button class="btn ghost" style="padding:3px 8px;font-size:11px;" onclick="clearWin()">초기화</button>
          </div>
        </div>
        <div class="winning-grid" id="winningGrid"></div>
        <div id="compareBtn" style="margin-top:8px;display:none;">
          <button class="btn primary" style="width:100%;" onclick="compareAll()">당첨번호와 비교하기 →</button>
        </div>
      </div>

      <!-- 결과 -->
      <div class="rp-section scrollable">
        <div class="results-inner" id="resultsInner">
          <div class="results-empty">
            <div class="icon">🎱</div>
            <div>조합 추천 후 당첨번호를 입력하면<br>결과를 비교해드려요</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile nav -->
  <div class="mobile-page-nav">
    <div class="mpn-btn active" id="mpn-left"  onclick="mobilePage('left')">📋 번호 선택</div>
    <div class="mpn-btn"       id="mpn-right" onclick="mobilePage('right')">🎯 조합·비교</div>
  </div>
</div>

<script>
const SETS=5, MAX=6;
let currentSet=0;
const setData=Array.from({length:SETS},()=>new Set());
let winNums=new Set();   // 당첨 6개
let bonusNum=null;       // 보너스 1개
let combos=[];           // 현재 추천 조합들
let winningMode='main';  // 'main' | 'bonus' — 다음 클릭이 어디에 들어갈지

function rClass(n){
  if(n<=10) return 'r1';
  if(n<=20) return 'r2';
  if(n<=30) return 'r3';
  if(n<=40) return 'r4';
  return 'r5';
}
function getDups(){
  const cnt={};
  setData.forEach(s=>s.forEach(n=>{cnt[n]=(cnt[n]||0)+1;}));
  return new Set(Object.entries(cnt).filter(([,c])=>c>1).map(([n])=>+n));
}
function getGrade(hits, hasBonus){
  if(hits===6)                    return 1;
  if(hits===5 && hasBonus)        return 2;
  if(hits===5)                    return 3;
  if(hits===4)                    return 4;
  if(hits===3)                    return 5;
  return 0;
}
function gradeLabel(g){
  if(g===1) return '🏆 1등';
  if(g===2) return '🥈 2등';
  if(g===3) return '🥉 3등';
  if(g===4) return '4등';
  if(g===5) return '5등';
  return '미당첨';
}
function gradeCls(g){
  if(g===1) return 'rank-1';
  if(g===2) return 'rank-2';
  if(g===3) return 'rank-3';
  if(g===4) return 'rank-4';
  if(g===5) return 'rank-5';
  return 'rank-none';
}

/* ── Build left grid ── */
function buildTabs(){
  const el=document.getElementById('tabs');
  for(let s=0;s<SETS;s++){
    const t=document.createElement('div');
    t.className='tab'+(s===0?' active':'');
    t.textContent=`${s+1}세트`;
    t.id=`tab-${s}`;
    t.onclick=()=>switchSet(s);
    el.appendChild(t);
  }
}
function buildGrid(){
  const el=document.getElementById('numGrid');
  [[1,10],[11,20],[21,30],[31,40],[41,45]].forEach(([from,to])=>{
    const row=document.createElement('div');
    row.className='num-row';
    const lbl=document.createElement('div');
    lbl.className='row-label';
    lbl.textContent=`${from}~`;
    row.appendChild(lbl);
    for(let n=from;n<=to;n++){
      const btn=document.createElement('div');
      btn.className='nb';btn.textContent=n;btn.id=`nb-${n}`;
      btn.onclick=()=>toggle(currentSet,n);
      row.appendChild(btn);
    }
    el.appendChild(row);
  });
}
function buildOverview(){
  const el=document.getElementById('setsOverview');
  for(let s=0;s<SETS;s++){
    const row=document.createElement('div');
    row.className='set-ov-row';row.id=`ov-${s}`;
    el.appendChild(row);
  }
}

/* ── Build winning number grid ── */
function buildWinGrid(){
  const el=document.getElementById('winningGrid');
  [[1,10],[11,20],[21,30],[31,40],[41,45]].forEach(([from,to])=>{
    const row=document.createElement('div');
    row.className='winning-row-line';
    const lbl=document.createElement('div');
    lbl.className='winning-row-lbl';
    lbl.textContent=`${from}~`;
    row.appendChild(lbl);
    for(let n=from;n<=to;n++){
      const btn=document.createElement('div');
      btn.className='wnb';btn.textContent=n;btn.id=`wnb-${n}`;
      btn.onclick=()=>toggleWin(n);
      row.appendChild(btn);
    }
    // 보너스 구분선 (45번 행에만)
    if(to===45){
      const sep=document.createElement('span');
      sep.className='bonus-sep';sep.textContent='+';
      row.appendChild(sep);
      const bBtn=document.createElement('div');
      bBtn.className='wnb';bBtn.id='bonus-indicator';
      bBtn.textContent='B';bBtn.style.fontSize='10px';
      bBtn.title='보너스번호 — 위 번호판에서 선택';
      row.appendChild(bBtn);
    }
    el.appendChild(row);
  });
}

/* ── Toggle winning number ── */
function toggleWin(n){
  // 이미 당첨번호에 있으면 제거
  if(winNums.has(n)){
    winNums.delete(n);
    if(bonusNum===n) bonusNum=null;
    refreshWin();
    return;
  }
  // 이미 보너스번호면 제거
  if(bonusNum===n){
    bonusNum=null;
    refreshWin();
    return;
  }
  // 당첨 6개 아직 안 찼으면 당첨번호로
  if(winNums.size<6){
    winNums.add(n);
  } else if(bonusNum===null){
    // 당첨 6개 찼고 보너스 없으면 보너스로
    bonusNum=n;
  }
  // 둘 다 찼으면 무시
  refreshWin();
}

function refreshWin(){
  for(let n=1;n<=45;n++){
    const btn=document.getElementById(`wnb-${n}`);
    if(!btn) continue;
    const isWin=winNums.has(n);
    const isBonus=bonusNum===n;
    btn.className='wnb'
      +(isWin?` win-sel ${rClass(n)}`:'')
      +(isBonus?' bonus-sel':'');
  }
  // bonus indicator
  const bi=document.getElementById('bonus-indicator');
  if(bi){
    if(bonusNum!==null){
      bi.className=`wnb bonus-sel`;
      bi.textContent=bonusNum;
    } else {
      bi.className='wnb';
      bi.textContent='B';
    }
  }
  document.getElementById('winCount').textContent=winNums.size;
  document.getElementById('bonusCount').textContent=bonusNum!==null?1:0;

  // 비교 버튼
  const compareBtn=document.getElementById('compareBtn');
  const hasCombos=combos.length>0;
  const winReady=winNums.size===6;
  compareBtn.style.display=(hasCombos&&winReady)?'block':'none';

  // 조합이 이미 있고 당첨번호도 있으면 실시간 비교
  if(hasCombos && winReady) renderResults();
}

function clearWin(){
  winNums.clear();bonusNum=null;
  refreshWin();
  if(combos.length>0) renderResults();
}

/* ── Left panel logic ── */
function toggle(s,n){
  const sel=setData[s];
  if(sel.has(n)) sel.delete(n);
  else{ if(sel.size>=MAX) return; sel.add(n); }
  if(sel.size===MAX && s+1<SETS) setTimeout(()=>switchSet(s+1),180);
  refresh();
}
function switchSet(s){
  currentSet=s;
  for(let i=0;i<SETS;i++) document.getElementById(`tab-${i}`).classList.toggle('active',i===s);
  document.getElementById('gridLabel').textContent=`${s+1}세트 번호 선택`;
  refresh();
}
function mobilePage(side){
  document.getElementById('body').classList.toggle('show-right',side==='right');
  document.getElementById('mpn-left').classList.toggle('active',side==='left');
  document.getElementById('mpn-right').classList.toggle('active',side==='right');
}

function refresh(){
  const dups=getDups(), sel=setData[currentSet];
  for(let n=1;n<=45;n++){
    const btn=document.getElementById(`nb-${n}`);
    const isSel=sel.has(n), isDup=dups.has(n)&&isSel;
    btn.className='nb'
      +(isSel?` sel ${rClass(n)}`:'')
      +(isDup?' dup-ring':'')
      +(!isSel&&sel.size>=MAX?' disabled':'');
  }
  document.getElementById('gridCount').textContent=sel.size;

  const ballsRow=document.getElementById('ballsRow');
  const sorted=[...sel].sort((a,b)=>a-b);
  ballsRow.innerHTML=sorted.length===0
    ?'<span class="ball-empty">선택한 번호가 여기에 표시됩니다</span>'
    :sorted.map(n=>`<div class="ball ${rClass(n)}${dups.has(n)?' dup-ball':''}">${n}</div>`).join('')
      +`<button class="clear-set-btn" onclick="clearSet(${currentSet})">초기화</button>`;

  for(let s=0;s<SETS;s++){
    const tab=document.getElementById(`tab-${s}`);
    const sd=setData[s], hasDup=[...sd].some(n=>dups.has(n));
    tab.className='tab'
      +(s===currentSet?' active':'')
      +(sd.size===MAX&&!hasDup?' done':'')
      +(hasDup?' has-dup':'');
    tab.textContent=`${s+1}세트`;
  }
  for(let s=0;s<SETS;s++){
    const row=document.getElementById(`ov-${s}`);
    const sd=setData[s];
    const sortedS=[...sd].sort((a,b)=>a-b);
    const slots=Array.from({length:MAX},(_,i)=>sortedS[i]??null);
    row.innerHTML=
      `<span class="set-ov-label">${s+1}세트</span>`
      +`<div class="set-ov-balls">`
      +slots.map(n=>n===null
        ?`<div class="sm-ball empty-slot"></div>`
        :`<div class="sm-ball ${rClass(n)}${getDups().has(n)?' dup-ball':''}">${n}</div>`
      ).join('')
      +`</div>`
      +`<span class="set-ov-status${sd.size===MAX?' done':''}">${sd.size}/6</span>`;
  }

  const all=[]; setData.forEach(s=>s.forEach(n=>all.push(n)));
  const unique=[...new Set(all)], dupList=[...getDups()].sort((a,b)=>a-b);
  const sumRow=document.getElementById('summaryRow');
  sumRow.innerHTML=all.length===0
    ?'<span class="summary-text">번호를 선택해주세요</span>'
    :`<span class="summary-text">전체 <b>${all.length}개</b></span>`
      +`<span class="badge uniq">고유 ${unique.length}개</span>`
      +(dupList.length>0?`<span class="badge dup">중복 ${dupList.length}개: ${dupList.join(', ')}</span>`:'');
}

function clearSet(s){ setData[s].clear(); refresh(); }
function resetAll(){
  setData.forEach(s=>s.clear()); currentSet=0; switchSet(0);
  combos=[];
  document.getElementById('warnBar').style.display='none';
  document.getElementById('resultsInner').innerHTML=
    `<div class="results-empty"><div class="icon">🎱</div><div>조합 추천 후 당첨번호를 입력하면<br>결과를 비교해드려요</div></div>`;
  refreshWin();
  refresh();
}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function generate(){
  const all=[]; setData.forEach(s=>s.forEach(n=>all.push(n)));
  const pool=[...new Set(all)];
  const warn=document.getElementById('warnBar');
  if(pool.length<6){
    warn.textContent=`고유 번호가 ${pool.length}개뿐이에요. 최소 6개 이상 필요해요.`;
    warn.style.display='block'; return;
  }
  warn.style.display='none';
  const count=+document.getElementById('countSel').value;
  combos=[];
  const seen=new Set(); let tries=0;
  while(combos.length<count&&tries<30000){
    tries++;
    const pick=shuffle(pool).slice(0,6).sort((a,b)=>a-b);
    const key=pick.join('-');
    if(!seen.has(key)){seen.add(key);combos.push(pick);}
  }
  renderResults();
  refreshWin();
  if(window.innerWidth<768) mobilePage('right');
}

function compareAll(){ renderResults(); }

/* ── Render results ── */
function renderResults(){
  const inner=document.getElementById('resultsInner');
  inner.innerHTML='';

  if(combos.length===0){
    inner.innerHTML=`<div class="results-empty"><div class="icon">🎱</div><div>조합 추천 후 당첨번호를 입력하면<br>결과를 비교해드려요</div></div>`;
    return;
  }

  const hasWin=winNums.size===6;

  // 당첨번호 표시 헤더
  if(hasWin){
    const winBar=document.createElement('div');
    winBar.style.cssText='display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap;';
    winBar.innerHTML=
      `<span style="font-size:11px;color:var(--text3);flex-shrink:0;">당첨번호</span>`
      +[...winNums].sort((a,b)=>a-b).map(n=>`<div class="r-ball ${rClass(n)}" style="outline:2px solid rgba(232,200,74,0.5);outline-offset:1px;">${n}</div>`).join('')
      +(bonusNum!==null?`<span style="font-size:11px;color:var(--text3);margin-left:2px;">+</span><div class="r-ball ${rClass(bonusNum)}" style="outline:2px solid rgba(192,132,252,0.6);outline-offset:1px;">${bonusNum}</div>`:'');
    inner.appendChild(winBar);
  }

  combos.forEach((combo,idx)=>{
    const card=document.createElement('div');
    card.className='result-card';
    card.style.animationDelay=(idx*0.05)+'s';

    let topHtml=`<div class="rc-top">`;
    topHtml+=`<span class="rc-idx">${idx+1}</span>`;

    if(hasWin){
      const hits=combo.filter(n=>winNums.has(n)).length;
      const hasBonus=bonusNum!==null&&combo.includes(bonusNum);
      const grade=getGrade(hits, hasBonus);

      // balls with hit highlight
      topHtml+=`<div class="rc-balls">`;
      topHtml+=combo.map(n=>{
        const isHit=winNums.has(n);
        const isBonus=bonusNum===n&&!isHit;
        let cls=`r-ball ${rClass(n)}`;
        if(!isHit&&!isBonus) cls+=' dimmed';
        if(isHit) cls+=' hit-ring';
        if(isBonus) cls+=' bonus-ring';
        return `<div class="${cls}">${n}</div>`;
      }).join('');
      topHtml+=`</div>`;
      topHtml+=`<div class="rc-rank"><span class="rank-badge ${gradeCls(grade)}">${gradeLabel(grade)}</span></div>`;
      topHtml+=`</div>`;

      // match info bar
      topHtml+=`<div class="rc-compare">`;
      topHtml+=`<span style="font-size:11px;color:var(--text3);">`;
      topHtml+=`<span class="match-hit">${hits}개 일치</span>`;
      if(hasBonus&&grade!==1&&grade!==2) topHtml+=` <span class="match-bonus">+ 보너스</span>`;
      else if(hasBonus&&grade===2) topHtml+=` <span class="match-bonus">+ 보너스</span>`;
      topHtml+=`</span>`;

      // mini progress dots
      topHtml+=`<div style="display:flex;gap:3px;margin-left:auto;">`;
      for(let i=0;i<6;i++){
        const filled=i<hits;
        topHtml+=`<div style="width:8px;height:8px;border-radius:50%;background:${filled?'var(--hit)':'var(--surface2)'};border:1px solid ${filled?'var(--hit)':'var(--border2)'}"></div>`;
      }
      if(hasBonus) topHtml+=`<div style="width:8px;height:8px;border-radius:50%;background:var(--bonus);border:1px solid var(--bonus);margin-left:2px;"></div>`;
      topHtml+=`</div>`;
      topHtml+=`</div>`;
    } else {
      // 당첨번호 없을 때 - 그냥 볼만 표시
      topHtml+=`<div class="rc-balls">`;
      topHtml+=combo.map(n=>`<div class="r-ball ${rClass(n)}">${n}</div>`).join('');
      topHtml+=`</div></div>`;
    }

    card.innerHTML=topHtml;
    inner.appendChild(card);
  });

  // 당첨번호 없으면 안내
  if(!hasWin && combos.length>0){
    const tip=document.createElement('div');
    tip.style.cssText='font-size:12px;color:var(--text3);text-align:center;padding:8px 0;';
    tip.textContent='위 당첨번호 입력란에서 6개를 선택하면 비교 결과를 볼 수 있어요';
    inner.appendChild(tip);
  }
}

buildTabs(); buildGrid(); buildOverview(); buildWinGrid();
refresh(); refreshWin();
</script>
